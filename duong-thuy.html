<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đường Thủy — Vietnamese Inland Waterway Quiz</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☯️</text></svg>" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Layout ─────────────────────────────────────── */
    #quiz-app {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 100px;
      text-align: left;
    }

    /* ── Header ─────────────────────────────────────── */
    .quiz-header {
      margin-bottom: 40px;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 24px;
    }
    .quiz-header h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      color: #111;
    }
    .quiz-header p {
      font-size: 0.78rem;
      color: #aaa;
      margin: 0;
      letter-spacing: 0.03em;
    }

    /* ── Controls row ────────────────────────────────── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .mode-group {
      display: flex;
      gap: 1px;
      align-items: center;
    }
    .mode-label {
      font-size: 0.7rem;
      color: #bbb;
      margin-right: 8px;
      letter-spacing: 0.06em;
    }
    .mode-btn {
      font-family: Georgia, serif;
      font-size: 0.7rem;
      padding: 5px 14px;
      border: 1px solid #e0e0e0;
      background: #fff;
      cursor: pointer;
      letter-spacing: 0.04em;
      color: #888;
      transition: all 0.15s;
    }
    .mode-btn:first-of-type { border-radius: 0; }
    .mode-btn + .mode-btn { border-left: none; }
    .mode-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
      z-index: 1;
    }
    .mode-btn:hover:not(.active) { background: #f8f8f8; color: #444; }

    .weak-count {
      font-size: 0.7rem;
      color: #ccc;
      margin-left: auto;
      letter-spacing: 0.02em;
    }
    .weak-count span { color: #e57373; }

    /* ── Section filter ──────────────────────────────── */
    .section-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 28px;
    }
    .section-btn {
      font-family: Georgia, serif;
      font-size: 0.68rem;
      padding: 4px 11px;
      border: 1px solid #e8e8e8;
      background: #fff;
      cursor: pointer;
      letter-spacing: 0.03em;
      color: #888;
      transition: all 0.12s;
    }
    .section-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .section-btn:hover:not(.active):not(:disabled) {
      background: #f5f5f5;
      color: #444;
      border-color: #ccc;
    }
    .section-btn.weak-btn {
      border-color: #fcc;
      color: #c0392b;
    }
    .section-btn.weak-btn.active {
      background: #c0392b;
      border-color: #c0392b;
      color: #fff;
    }
    .section-btn.weak-btn:hover:not(.active):not(:disabled) {
      background: #fff5f5;
      border-color: #e57373;
    }

    /* ── Progress ────────────────────────────────────── */
    .progress-bar-wrap {
      height: 1px;
      background: #ebebeb;
      margin-bottom: 36px;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      background: #111;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .progress-label {
      position: absolute;
      right: 0;
      top: 6px;
      font-size: 0.65rem;
      color: #ccc;
      letter-spacing: 0.04em;
    }

    /* ── Question card ───────────────────────────────── */
    #question-screen {
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .question-meta {
      font-size: 0.68rem;
      color: #bbb;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .question-text {
      font-size: 1.08rem;
      line-height: 1.65;
      margin-bottom: 6px;
      color: #111;
    }
    .question-translation {
      font-size: 0.78rem;
      color: #aaa;
      margin-bottom: 24px;
      font-style: italic;
      line-height: 1.5;
    }

    /* ── Images ──────────────────────────────────────── */
    .question-image-wrap {
      margin-bottom: 24px;
    }
    .question-image-wrap img,
    .answer-image-wrap img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      display: block;
      border: 1px solid #f0f0f0;
      cursor: zoom-in;
      transition: opacity 0.15s, transform 0.15s;
      border-radius: 2px;
    }
    .question-image-wrap img:hover,
    .answer-image-wrap img:hover {
      opacity: 0.85;
      transform: scale(1.01);
    }
    .answer-image-wrap {
      margin-top: 16px;
      display: none;
      animation: fadeIn 0.25s ease;
    }
    .answer-image-wrap.visible { display: block; }
    .answer-image-wrap img { max-height: 220px; }
    .answer-image-label {
      font-size: 0.65rem;
      color: #bbb;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Lightbox ────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      animation: lbFade 0.18s ease;
    }
    @keyframes lbFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
      border: none;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6);
      animation: lbScale 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    @keyframes lbScale {
      from { transform: scale(0.88); }
      to   { transform: scale(1); }
    }
    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      color: rgba(255,255,255,0.6);
      font-size: 1.8rem;
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      font-family: Georgia, serif;
      transition: color 0.15s;
    }
    #lightbox-close:hover { color: #fff; }

    /* ── Choices ─────────────────────────────────────── */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
    }
    .choice-btn {
      font-family: Georgia, serif;
      font-size: 0.88rem;
      text-align: left;
      padding: 13px 18px;
      border: 1px solid #e8e8e8;
      background: #fff;
      cursor: pointer;
      line-height: 1.55;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      display: flex;
      flex-direction: column;
    }
    .choice-btn:hover:not(:disabled) {
      background: #f8f8f8;
      border-color: #ccc;
    }
    .choice-btn:active:not(:disabled) {
      transform: scale(0.995);
    }
    .choice-btn.correct {
      background: #f0fff4;
      border-color: #66bb6a;
      animation: correctPop 0.25s ease;
    }
    @keyframes correctPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    .choice-btn.wrong {
      background: #fff5f5;
      border-color: #ef9a9a;
    }
    .choice-btn.reveal-correct {
      background: #f0fff4;
      border-color: #66bb6a;
    }
    .choice-btn:disabled { cursor: default; }
    .choice-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .choice-letter {
      font-size: 0.68rem;
      color: #ccc;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      width: 14px;
    }
    .choice-btn.correct .choice-letter,
    .choice-btn.reveal-correct .choice-letter { color: #4caf50; }
    .choice-btn.wrong .choice-letter { color: #ef5350; }
    .choice-vi { color: #111; }
    .choice-en {
      font-size: 0.73rem;
      color: #bbb;
      font-style: italic;
      margin-top: 3px;
      padding-left: 24px;
    }

    /* ── Feedback ────────────────────────────────────── */
    .feedback {
      font-size: 0.82rem;
      line-height: 1.7;
      padding: 14px 18px;
      border-left: 2px solid #ddd;
      background: #fafafa;
      color: #555;
      margin-bottom: 24px;
      display: none;
      animation: fadeIn 0.2s ease;
    }
    .feedback.visible { display: block; }

    /* ── Nav ─────────────────────────────────────────── */
    .nav-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .nav-btn {
      font-family: Georgia, serif;
      font-size: 0.78rem;
      padding: 10px 24px;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: #333; border-color: #333; }
    .nav-btn:disabled { opacity: 0.28; cursor: default; }
    .skip-link {
      font-size: 0.73rem;
      color: #ccc;
      cursor: pointer;
      background: none;
      border: none;
      font-family: Georgia, serif;
      padding: 0;
      letter-spacing: 0.03em;
      transition: color 0.12s;
    }
    .skip-link:hover { color: #888; }

    /* ── Score screen ────────────────────────────────── */
    #score-screen { display: none; }
    #score-screen.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    .score-display {
      font-size: 3.5rem;
      font-weight: normal;
      margin-bottom: 6px;
      color: #111;
      letter-spacing: -0.02em;
    }
    .score-label {
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .score-breakdown {
      font-size: 0.75rem;
      color: #aaa;
      line-height: 2.2;
      margin-bottom: 36px;
      border-left: 1px solid #f0f0f0;
      padding-left: 16px;
    }
    .score-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .score-btn {
      font-family: Georgia, serif;
      font-size: 0.78rem;
      padding: 10px 22px;
      border: 1px solid #111;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .score-btn.primary { background: #111; color: #fff; }
    .score-btn.primary:hover { background: #333; border-color: #333; }
    .score-btn.secondary { background: #fff; color: #111; }
    .score-btn.secondary:hover { background: #f5f5f5; }
    .score-btn.danger { border-color: #ef9a9a; color: #c0392b; background: #fff; }
    .score-btn.danger:hover { background: #fff5f5; border-color: #e57373; }
    .score-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 480px) {
      #quiz-app { padding: 32px 16px 80px; }
      .quiz-header h1 { font-size: 1.2rem; }
      .question-text { font-size: 0.96rem; }
      .choice-btn { font-size: 0.84rem; padding: 11px 14px; }
      .score-display { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

  <!-- site nav -->
  <div class="menu">
    <button class="menu-trigger" aria-label="Open site menu">MENU</button>
    <ul class="dropdown" role="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="paintings.html">Paintings</a></li>
      <li><a href="exhibitions.html">Exhibitions</a></li>
      <li><a href="drawings.html">Drawings</a></li>
      <li><a href="video.html">Video</a></li>
      <li><a href="https://19933.biz/manhattanartcomic.html" target="_blank">🔗 Manhattan Art Comic</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>

  <!-- lightbox -->
  <div id="lightbox" role="dialog" aria-label="Image zoom">
    <button id="lightbox-close" aria-label="Close">×</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <div id="quiz-app">

    <!-- header -->
    <div class="quiz-header">
      <h1>đường thủy nội địa</h1>
      <p>Vietnamese Inland Waterway — bằng lái hạng IV</p>
    </div>

    <!-- controls -->
    <div class="controls-row">
      <div class="mode-group">
        <span class="mode-label">mode</span>
        <button class="mode-btn active" id="mode-quiz">quiz</button>
        <button class="mode-btn" id="mode-study">study</button>
      </div>
      <div class="weak-count" id="weak-count"></div>
    </div>

    <!-- section filter -->
    <div class="section-filter" id="section-filter"></div>

    <!-- progress -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      <div class="progress-label" id="progress-label"></div>
    </div>

    <!-- question -->
    <div id="question-screen">
      <div class="question-meta" id="question-meta"></div>
      <div class="question-text" id="question-text"></div>
      <div class="question-translation" id="question-translation"></div>

      <div class="question-image-wrap" id="question-image-wrap" style="display:none">
        <img id="question-img" src="" alt="question image" />
      </div>

      <div class="choices" id="choices"></div>

      <div class="answer-image-wrap" id="answer-image-wrap">
        <div class="answer-image-label">correct answer</div>
        <img id="answer-img" src="" alt="answer image" />
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="nav-row">
        <button class="nav-btn" id="next-btn" disabled>next →</button>
        <button class="skip-link" id="skip-btn">skip</button>
      </div>
    </div>

    <!-- score screen -->
    <div id="score-screen">
      <div class="score-display" id="score-display"></div>
      <div class="score-label" id="score-label"></div>
      <div class="score-breakdown" id="score-breakdown"></div>
      <div class="score-actions">
        <button class="score-btn primary" id="restart-btn">try again</button>
        <button class="score-btn danger" id="retry-missed-btn" style="display:none">retry missed</button>
        <button class="score-btn secondary" id="clear-weak-btn">clear weak list</button>
      </div>
    </div>

  </div>

  <script src="menu.js"></script>
  <script>
  (function () {
    'use strict';

    // ── Constants ─────────────────────────────────────────
    const IMG_BASE = 'duong_thuy/images/';
    const LS_KEY   = 'duong-thuy-weak';

    const SECTIONS = [
      { slug: 'all',                   label: 'all' },
      { slug: 'weak',                  label: 'weak' },
      { slug: 'an-toan-co-ban',        label: 'an toàn' },
      { slug: 'thuy-nghiep-co-ban',    label: 'thủy nghiệp' },
      { slug: 'luong-duong-thuy',      label: 'luồng đường thủy' },
      { slug: 'phap-luat-giao-thong',  label: 'pháp luật' },
      { slug: 'bao-hieu-giao-thong',   label: 'báo hiệu' },
      { slug: 'dieu-dong-phuong-tien', label: 'điều động' },
      { slug: 'van-tai-hang-hoa',      label: 'vận tải' },
    ];

    // ── State ─────────────────────────────────────────────
    let allQuestions    = [];
    let queue           = [];
    let currentIndex    = 0;
    let answered        = false;
    let score           = { correct: 0, wrong: 0, skipped: 0 };
    let sectionScores   = {};
    let missedThisRound = [];
    let activeSection   = 'all';
    let mode            = 'quiz';
    let weakIds         = loadWeak();
    let transitioning   = false;

    // ── DOM refs ──────────────────────────────────────────
    const $meta          = document.getElementById('question-meta');
    const $text          = document.getElementById('question-text');
    const $trans         = document.getElementById('question-translation');
    const $qImgWrap      = document.getElementById('question-image-wrap');
    const $qImg          = document.getElementById('question-img');
    const $choices       = document.getElementById('choices');
    const $aImgWrap      = document.getElementById('answer-image-wrap');
    const $aImg          = document.getElementById('answer-img');
    const $feedback      = document.getElementById('feedback');
    const $nextBtn       = document.getElementById('next-btn');
    const $skipBtn       = document.getElementById('skip-btn');
    const $progress      = document.getElementById('progress-fill');
    const $progressLabel = document.getElementById('progress-label');
    const $qScreen       = document.getElementById('question-screen');
    const $scoreScreen   = document.getElementById('score-screen');
    const $scoreDisp     = document.getElementById('score-display');
    const $scoreLabel    = document.getElementById('score-label');
    const $scoreBreak    = document.getElementById('score-breakdown');
    const $restartBtn    = document.getElementById('restart-btn');
    const $retryMissed   = document.getElementById('retry-missed-btn');
    const $clearWeak     = document.getElementById('clear-weak-btn');
    const $filterWrap    = document.getElementById('section-filter');
    const $weakCount     = document.getElementById('weak-count');
    const $lightbox      = document.getElementById('lightbox');
    const $lightboxImg   = document.getElementById('lightbox-img');
    const $lightboxClose = document.getElementById('lightbox-close');

    // ── Init ──────────────────────────────────────────────
    fetch('duong_thuy/questions.json')
      .then(r => r.json())
      .then(data => {
        allQuestions = data.questions;
        buildFilter();
        buildModeToggle();
        updateWeakCount();
        startQuiz();
      })
      .catch(() => {
        $text.textContent = 'Error loading questions. Run from a local server (python3 -m http.server 8000).';
      });

    // ── Weak list (localStorage) ──────────────────────────
    function loadWeak() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        return raw ? new Set(JSON.parse(raw)) : new Set();
      } catch (_) { return new Set(); }
    }
    function saveWeak() {
      try { localStorage.setItem(LS_KEY, JSON.stringify([...weakIds])); } catch (_) {}
    }
    function updateWeakCount() {
      const n = weakIds.size;
      $weakCount.innerHTML = n > 0 ? 'weak: <span>' + n + '</span>' : '';
      const weakBtn = $filterWrap.querySelector('.weak-btn');
      if (weakBtn) {
        weakBtn.textContent = 'weak (' + n + ')';
        weakBtn.disabled = n === 0;
        weakBtn.style.opacity = n === 0 ? '0.35' : '1';
        weakBtn.style.cursor = n === 0 ? 'default' : 'pointer';
      }
    }

    // ── Section filter ────────────────────────────────────
    function buildFilter() {
      $filterWrap.innerHTML = '';
      SECTIONS.forEach(sec => {
        const isWeak = sec.slug === 'weak';
        const count = isWeak
          ? weakIds.size
          : sec.slug === 'all'
            ? allQuestions.length
            : allQuestions.filter(q => q.section === sec.slug).length;

        const btn = document.createElement('button');
        btn.className = 'section-btn' +
          (sec.slug === activeSection ? ' active' : '') +
          (isWeak ? ' weak-btn' : '');
        btn.textContent = sec.label + ' (' + count + ')';
        if (isWeak && count === 0) {
          btn.disabled = true;
          btn.style.opacity = '0.35';
          btn.style.cursor = 'default';
        }

        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          activeSection = sec.slug;
          $filterWrap.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          startQuiz();
        });
        $filterWrap.appendChild(btn);
      });
    }

    // ── Mode toggle ───────────────────────────────────────
    function buildModeToggle() {
      document.getElementById('mode-quiz').addEventListener('click', () => {
        if (mode === 'quiz') return;
        mode = 'quiz';
        document.getElementById('mode-quiz').classList.add('active');
        document.getElementById('mode-study').classList.remove('active');
        startQuiz();
      });
      document.getElementById('mode-study').addEventListener('click', () => {
        if (mode === 'study') return;
        mode = 'study';
        document.getElementById('mode-study').classList.add('active');
        document.getElementById('mode-quiz').classList.remove('active');
        startQuiz();
      });
    }

    // ── Start quiz ────────────────────────────────────────
    function startQuiz(customQueue) {
      if (customQueue) {
        queue = customQueue;
      } else {
        let pool;
        if (activeSection === 'all') {
          pool = allQuestions.slice();
        } else if (activeSection === 'weak') {
          pool = allQuestions.filter(q => weakIds.has(q.id));
        } else {
          pool = allQuestions.filter(q => q.section === activeSection);
        }
        queue = pool.sort(() => Math.random() - 0.5);
      }

      currentIndex    = 0;
      score           = { correct: 0, wrong: 0, skipped: 0 };
      sectionScores   = {};
      missedThisRound = [];
      $retryMissed.style.display = 'none';
      $scoreScreen.classList.remove('visible');
      $qScreen.style.display = 'block';
      showQuestion();
    }

    // ── Show question (with fade transition) ──────────────
    function showQuestion() {
      if (currentIndex >= queue.length) { showScore(); return; }

      const q = queue[currentIndex];
      answered = false;

      // progress
      const pct = currentIndex / queue.length * 100;
      $progress.style.width = pct + '%';
      $progressLabel.textContent = (currentIndex + 1) + ' / ' + queue.length;

      // meta
      $meta.textContent = sectionLabel(q.section).toUpperCase() +
        (weakIds.has(q.id) ? '  ★' : '');

      // content
      $text.textContent = q.question_vi;
      $trans.textContent = q.translation ? q.translation.question_en : '';

      // question image
      if (q.image && q.image.question_img) {
        $qImg.src = IMG_BASE + encodeURIComponent(q.image.question_img);
        $qImgWrap.style.display = 'block';
      } else {
        $qImgWrap.style.display = 'none';
        $qImg.src = '';
      }

      // answer image (hidden until answered)
      $aImgWrap.classList.remove('visible');
      $aImg.src = q.image && q.image.answer_img
        ? IMG_BASE + encodeURIComponent(q.image.answer_img)
        : '';

      $feedback.textContent = '';
      $feedback.classList.remove('visible');
      $nextBtn.disabled = (mode === 'quiz');
      $skipBtn.style.display = (mode === 'quiz') ? 'inline' : 'none';

      // choices
      $choices.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      q.answers_vi.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        const enAns = q.translation && q.translation.answers_en ? q.translation.answers_en[i] : '';
        btn.innerHTML =
          '<div class="choice-header">' +
            '<span class="choice-letter">' + letters[i] + '</span>' +
            '<span class="choice-vi">' + escHtml(ans) + '</span>' +
          '</div>' +
          (enAns ? '<span class="choice-en">' + escHtml(enAns) + '</span>' : '');
        btn.dataset.index = i;
        btn.addEventListener('click', () => handleAnswer(i, q));
        if (mode === 'study' && i === q.correct_index) btn.classList.add('reveal-correct');
        $choices.appendChild(btn);
      });

      if (mode === 'study') {
        showExplanation(q);
        if (q.image && q.image.answer_img) $aImgWrap.classList.add('visible');
        $nextBtn.disabled = false;
      }

      // re-trigger fade animation
      $qScreen.style.animation = 'none';
      $qScreen.offsetHeight; // reflow
      $qScreen.style.animation = '';
    }

    // ── Handle answer ─────────────────────────────────────
    function handleAnswer(chosen, q) {
      if (answered && mode === 'quiz') return;
      answered = true;

      const btns = $choices.querySelectorAll('.choice-btn');
      btns.forEach(b => b.disabled = true);

      const correct = q.correct_index;
      const isCorrect = chosen === correct;

      if (isCorrect) {
        btns[chosen].classList.add('correct');
        score.correct++;
        if (weakIds.has(q.id)) { weakIds.delete(q.id); saveWeak(); updateWeakCount(); }
      } else {
        btns[chosen].classList.add('wrong');
        btns[correct].classList.add('reveal-correct');
        score.wrong++;
        missedThisRound.push(q);
        weakIds.add(q.id);
        saveWeak();
        updateWeakCount();
      }

      if (q.image && q.image.answer_img) $aImgWrap.classList.add('visible');
      showExplanation(q);
      $nextBtn.disabled = false;

      if (!sectionScores[q.section]) sectionScores[q.section] = { correct: 0, total: 0 };
      sectionScores[q.section].total++;
      if (isCorrect) sectionScores[q.section].correct++;
    }

    function showExplanation(q) {
      if (q.explanation_en) {
        $feedback.textContent = q.explanation_en;
        $feedback.classList.add('visible');
      }
    }

    // ── Navigation ────────────────────────────────────────
    $skipBtn.addEventListener('click', () => {
      if (answered) return;
      score.skipped++;
      currentIndex++;
      showQuestion();
    });

    $nextBtn.addEventListener('click', advance);
    function advance() {
      if (transitioning) return;
      transitioning = true;
      currentIndex++;
      showQuestion();
      setTimeout(() => { transitioning = false; }, 250);
    }

    // ── Keyboard ──────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if ($scoreScreen.classList.contains('visible')) {
        if (e.key === 'Enter') $restartBtn.click();
        return;
      }
      if ($lightbox.classList.contains('open')) { closeLightbox(); return; }
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;

      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (!$nextBtn.disabled) advance();
      }
      if ((e.key === 's' || e.key === 'S') && mode === 'quiz' && !answered) $skipBtn.click();

      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= 4 && !answered && mode === 'quiz') {
        const btns = $choices.querySelectorAll('.choice-btn');
        if (btns[n - 1] && !btns[n - 1].disabled) btns[n - 1].click();
      }
    });

    // ── Touch swipe ───────────────────────────────────────
    (function () {
      let tx = 0, ty = 0;
      const area = $qScreen;
      area.addEventListener('touchstart', e => {
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
      }, { passive: true });
      area.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        const dy = e.changedTouches[0].clientY - ty;
        if (Math.abs(dy) > Math.abs(dx) || Math.abs(dx) < 60) return;
        if (dx < 0 && !$nextBtn.disabled) advance();             // swipe left → next
        if (dx > 0 && mode === 'quiz' && !answered) $skipBtn.click(); // swipe right → skip
      }, { passive: true });
    })();

    // ── Score screen ──────────────────────────────────────
    function showScore() {
      $qScreen.style.display = 'none';
      $scoreScreen.classList.add('visible');
      $progress.style.width = '100%';
      $progressLabel.textContent = '';

      const answered_count = score.correct + score.wrong;
      const pct = answered_count > 0 ? Math.round(score.correct / answered_count * 100) : 0;

      $scoreDisp.textContent = score.correct + ' / ' + answered_count;

      let labelParts = [pct + '% correct'];
      if (score.skipped > 0) labelParts.push(score.skipped + ' skipped');
      if (weakIds.size > 0) labelParts.push(weakIds.size + ' weak total');
      $scoreLabel.textContent = labelParts.join('  ·  ');

      // per-section breakdown
      let breakdown = '';
      SECTIONS.slice(2).forEach(sec => {
        const s = sectionScores[sec.slug];
        if (s && s.total > 0) {
          const secPct = Math.round(s.correct / s.total * 100);
          breakdown += sec.label + ':  ' + s.correct + '/' + s.total + '  (' + secPct + '%)\n';
        }
      });
      $scoreBreak.style.whiteSpace = 'pre';
      $scoreBreak.textContent = breakdown || '';

      if (missedThisRound.length > 0) {
        $retryMissed.style.display = 'inline-block';
        $retryMissed.textContent = 'retry missed (' + missedThisRound.length + ')';
      } else {
        $retryMissed.style.display = 'none';
      }

      buildFilter(); // refresh weak count in filter
    }

    $restartBtn.addEventListener('click', () => startQuiz());
    $retryMissed.addEventListener('click', () => {
      startQuiz(missedThisRound.sort(() => Math.random() - 0.5));
    });
    $clearWeak.addEventListener('click', () => {
      weakIds.clear();
      saveWeak();
      updateWeakCount();
      buildFilter();
      if (activeSection === 'weak') { activeSection = 'all'; startQuiz(); }
    });

    // ── Lightbox ──────────────────────────────────────────
    function openLightbox(src) {
      $lightboxImg.src = src;
      $lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      $lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    $lightbox.addEventListener('click', e => {
      if (e.target === $lightbox || e.target === $lightboxClose) closeLightbox();
    });
    $qImg.addEventListener('click', () => { if ($qImg.src) openLightbox($qImg.src); });
    $aImg.addEventListener('click', () => { if ($aImg.src) openLightbox($aImg.src); });

    // ── Helpers ───────────────────────────────────────────
    function sectionLabel(slug) {
      const s = SECTIONS.find(x => x.slug === slug);
      return s ? s.label : slug;
    }
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  })();
  </script>
</body>
</html>
