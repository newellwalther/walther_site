  <script>
  (function () {
    'use strict';

    // ─────────────────────────────────────────
    // CANVAS
    // ─────────────────────────────────────────
    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    var W = 800;
    var H = 400;

    // ─────────────────────────────────────────
    // CONSTANTS
    // ─────────────────────────────────────────
    var GROUND_Y   = 338;   // y of ground surface
    var PLANE_X    = 118;   // fixed horizontal position of plane
    var GRAVITY    = 0.22;  // px per normalized frame
    var LIFT       = -5.2;  // velocity applied on button press
    var MAX_FALL   = 6.5;   // max downward velocity
    var HYPOXIA_Y  = 58;    // if plane.y < this, hypoxia kicks in
    var HYPOXIA_DUR = 3.0;  // seconds before auto-descend triggers
    var AUTO_G     = 0.75;  // extra gravity when auto-descending
    var CRASH_DUR  = 1.4;   // seconds for crash debris animation

    // Replace with your deployed GAS web app URL after setup
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxOW7UbzYoJh888mfOREAfyPgH2zxU4Uo93clAHD0Cmqt9CIzzIzG0G1Go_wEy2g_ep/exec';

    // ─────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────
    var state = 'intro';  // intro | runway | flying | dead
    var elapsed = 0;      // seconds aloft
    var globalBest = null;
    var plane, trees, smallTrees, animals, clouds, fish, lakes, bgOffset, groundOffset, bgSpeed, frameCount;
    var hypoxiaTimer, hypoxiaActive, autoDescending, inputThisFrame;
    var inverted;
    var prevBearMilestone, prevMooseMilestone;
    var crashPieces, crashTimer;

    function resetAll() {
      plane = {
        y: GROUND_Y - 16,
        velY: 0,
        angle: 0,
        runwayVel: 0
      };
      trees = [];
      smallTrees = [];
      animals = [];
      clouds = [];
      fish = [];
      lakes = [];
      crashPieces = [];
      crashTimer = 0;
      bgOffset = 0;
      groundOffset = 0;
      bgSpeed = 0;
      frameCount = 0;
      elapsed = 0;
      hypoxiaTimer = 0;
      hypoxiaActive = false;
      autoDescending = false;
      inverted = false;
      inputThisFrame = false;
      prevBearMilestone = 0;
      prevMooseMilestone = 0;
    }

    // ─────────────────────────────────────────
    // INPUT
    // ─────────────────────────────────────────
    function handleInput() {
      if (state === 'intro' || state === 'dead') {
        if (document.getElementById('nameEntry').style.display === 'block') return;
        resetAll();
        state = 'runway';
        return;
      }
      if (state === 'flying') {
        inputThisFrame = true;
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space') {
        e.preventDefault();
        handleInput();
      }
    });

    var flyBtn = document.getElementById('flyBtn');
    flyBtn.addEventListener('touchstart', function (e) {
      e.preventDefault();
      handleInput();
    }, { passive: false });
    flyBtn.addEventListener('mousedown', function (e) {
      e.preventDefault();
      handleInput();
    });

    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      handleInput();
    }, { passive: false });
    canvas.addEventListener('mousedown', function () {
      handleInput();
    });

    // ─────────────────────────────────────────
    // DIFFICULTY — smooth ramp over time
    // ─────────────────────────────────────────
    function getDiff() {
      var t = elapsed;
      return {
        speed:          Math.min(2.0 + t * 0.0085, 4.8),
        treeMaxH:       Math.min(36 + t * 0.55,  165),
        treeMinGap:     Math.max(310 - t * 0.50,  135),
        cloudBottomMin: Math.min(52 + t * 0.60,  235),
        treeChance:     Math.min(0.0022 + t * 0.000028, 0.009),
        cloudChance:    Math.min(0.0009 + t * 0.000014, 0.004)
      };
    }

    // ─────────────────────────────────────────
    // UPDATE
    // ─────────────────────────────────────────
    var lastTs = null;

    function update(ts) {
      // dt normalized: 1.0 at 60fps, 2.0 at 30fps
      var dt = lastTs ? Math.min((ts - lastTs) / 16.667, 3.0) : 1.0;
      lastTs = ts;
      frameCount++;

      if (state === 'runway') {
        updateRunway(dt);
      } else if (state === 'flying') {
        updateFlying(dt);
      } else if (state === 'crashing') {
        updateCrash(dt);
      }
    }

    function updateRunway(dt) {
      plane.runwayVel = Math.min(plane.runwayVel + 0.55 * dt, 100);
      groundOffset   -= plane.runwayVel * dt * 0.48;
      bgSpeed         = plane.runwayVel * 0.07;   // carry this speed into flight
      bgOffset       -= bgSpeed * dt;

      // Slight taxi bump
      plane.y = (GROUND_Y - 16) + Math.sin(frameCount * 0.35) * 0.9;

      // Liftoff threshold
      if (plane.runwayVel >= 92) {
        state = 'flying';
        plane.y = GROUND_Y - 16;
        plane.velY = LIFT;
        plane.angle = -0.22;
      }
    }

    function updateFlying(dt) {
      var diff = getDiff();
      elapsed += dt / 60;

      // Apply lift if button pressed — blocked during auto-descend or inversion
      if (inputThisFrame && !autoDescending && !inverted) {
        plane.velY = LIFT;
      }

      // Gravity (add extra if auto-descending or inverted)
      var g = GRAVITY + (autoDescending ? AUTO_G : 0) + (inverted ? 0.5 : 0);
      plane.velY = Math.min(plane.velY + g * dt, MAX_FALL);
      plane.y   += plane.velY * dt;

      // Visual tilt — follows velocity
      var targetAngle = plane.velY * 0.044;
      plane.angle += (targetAngle - plane.angle) * 0.13;
      plane.angle  = Math.max(-0.38, Math.min(0.44, plane.angle));

      // Hypoxia check — auto-descend triggers immediately on entry
      if (plane.y < HYPOXIA_Y) {
        if (!hypoxiaActive) { hypoxiaActive = true; hypoxiaTimer = 0; autoDescending = true; }
        hypoxiaTimer += dt / 60;
      } else {
        hypoxiaActive = false;
        hypoxiaTimer  = 0;
        if (plane.y > GROUND_Y - 65) autoDescending = false;
      }

      // Hit ground
      if (plane.y + 14 >= GROUND_Y) {
        plane.y = GROUND_Y - 14;
        doGameOver();
        return;
      }

      // Spawn
      spawnObjects(diff);

      // Move objects
      var spd = diff.speed * dt;
      trees      = trees.filter(function (t)  { return t.x > -70; });
      smallTrees = smallTrees.filter(function (t) { return t.x > -20; });
      animals    = animals.filter(function (a)  { return a.x > -140; });
      clouds     = clouds.filter(function (c)  { return c.x > -c.w - 10; });
      trees.forEach(function      (t) { t.x -= spd; });
      smallTrees.forEach(function (t) { t.x -= spd; });
      animals.forEach(function    (a) { a.x -= spd; });
      clouds.forEach(function     (c) { c.x -= spd; });

      // Background scroll — mountain speed locked to runway liftoff speed
      bgOffset     -= bgSpeed * dt;
      // Ground hills scroll at tree speed
      groundOffset -= diff.speed * dt;

      // Lakes + fish
      lakes = lakes.filter(function (l) { return l.x > -l.w / 2 - 10; });
      fish  = fish.filter(function  (f) { return f.y < GROUND_Y + 8; });
      lakes.forEach(function (l) { l.x -= spd; });
      fish.forEach(function  (f) { f.x -= spd; f.y += f.vy; f.vy += 0.13; });
      // Fish spawn from visible lakes
      lakes.forEach(function (l) {
        if (l.x > 20 && l.x < W - 20 && Math.random() < 0.007) {
          fish.push({ x: l.x + (Math.random() - 0.5) * l.w * 0.55,
                      y: GROUND_Y - 2,
                      vy: -(5.5 + Math.random() * 3.5) });
        }
      });

      // Animal milestone spawning
      var bearMilestone  = Math.floor(elapsed / 30);
      var mooseMilestone = Math.floor(elapsed / 75);
      if (bearMilestone  > prevBearMilestone)  { prevBearMilestone  = bearMilestone;  animals.push({ x: W + 60, type: 'bear' }); }
      if (mooseMilestone > prevMooseMilestone) { prevMooseMilestone = mooseMilestone; animals.push({ x: W + 60, type: 'moose' }); }

      // Collision — cloud → invert, obstacle → crash
      var hit = checkCollision();
      if (hit === 'cloud' && !inverted) {
        triggerInversion();
      } else if (hit) {
        doGameOver();
      }

      inputThisFrame = false;
    }

    function spawnObjects(diff) {
      if (Math.random() < diff.treeChance) {
        var lastT = trees[trees.length - 1];
        if (!lastT || (W - lastT.x) >= diff.treeMinGap) {
          var roll = Math.random();
          var type, h, hw;
          if (roll < 0.44) {
            type = 'tree';
            h  = 32 + Math.random() * Math.max(1, diff.treeMaxH - 32);
            hw = 20;
          } else if (roll < 0.62) {
            type = 'cabin';
            h  = 46 + Math.random() * 42;   // 46–88 px
            hw = 30;
          } else if (roll < 0.78) {
            type = 'totem';
            h  = 58 + Math.random() * 58;   // 58–116 px
            hw = 22;
          } else {
            type = 'igloo';
            h  = 36 + Math.random() * 22;   // radius 36–58
            hw = Math.round(h * 1.1);
          }
          trees.push({ x: W + 30, h: h, type: type, hw: hw });
        }
      }
      // Small decorative trees (no collision, denser fill)
      if (Math.random() < 0.022) {
        smallTrees.push({ x: W + 8, h: 12 + Math.random() * 30 });
      }
      // Lakes — white ovals on the ground, source of jumping fish
      if (Math.random() < 0.004) {
        var lw = 55 + Math.random() * 80;
        lakes.push({ x: W + lw / 2, w: lw });
      }
      // Clouds — more height variation
      if (Math.random() < diff.cloudChance) {
        var lastC = clouds[clouds.length - 1];
        if (!lastC || (W - lastC.x) >= 175) {
          var cw     = 80 + Math.random() * 100;
          var bumpR  = 24 + Math.random() * 22;   // bigger = rounder/bubblier
          var bottom = diff.cloudBottomMin + Math.random() * 90;
          clouds.push({ x: W + cw / 2 + 10, w: cw, bottom: bottom, bumpR: bumpR });
        }
      }
    }

    // ─────────────────────────────────────────
    // COLLISION — forgiving AABB
    // ─────────────────────────────────────────
    function checkCollision() {
      // Plane hitbox (smaller than visual)
      var px = PLANE_X - 16;
      var py = plane.y  - 5;
      var pw = 44;
      var ph = 10;

      // Ground obstacles
      var i, t, c;
      for (i = 0; i < trees.length; i++) {
        t = trees[i];
        var tLeft  = t.x - (t.hw || 20);
        var tRight = t.x + (t.hw || 20);
        var tTop   = GROUND_Y - t.h;
        if (px < tRight && px + pw > tLeft && py + ph > tTop) return 'obstacle';
      }

      // Clouds — returns 'cloud' so caller can trigger inversion instead of crash
      for (i = 0; i < clouds.length; i++) {
        c = clouds[i];
        var cLeft  = c.x - c.w / 2;
        var cRight = c.x + c.w / 2;
        if (px < cRight && px + pw > cLeft && py < c.bottom && py + ph > 0) return 'cloud';
      }

      return null;
    }

    function triggerInversion() {
      inverted = true;
      plane.velY = MAX_FALL;  // immediately diving
    }

    // ─────────────────────────────────────────
    // CRASH ANIMATION → GAME OVER
    // ─────────────────────────────────────────
    function doGameOver() {
      if (state === 'crashing') return;
      state = 'crashing';
      crashTimer = 0;
      initCrashPieces();
    }

    function initCrashPieces() {
      crashPieces = [];
      var px = PLANE_X, py = plane.y;
      function rv(n) { return Math.random() * n; }
      // [relX, relY, vx, vy, w, h, spin]
      var defs = [
        [  8,  0,  2+rv(3), -3-rv(3), 18,  5,  0.12],  // nose
        [-12,  0, -3-rv(2), -2-rv(2), 14,  5, -0.09],  // tail
        [  0,  4, -1+rv(3), -5-rv(3), 26,  4,  0.18],  // wing
        [ -2, -8,  1+rv(2), -4-rv(2), 12,  8,  0.15],  // cabin
        [-31,  3, -2-rv(2), -1-rv(3),  9,  4, -0.13],  // h-stab
        [ 42,  0,  4+rv(3), -5-rv(3),  4, 14,  0.28],  // prop
      ];
      defs.forEach(function (d) {
        crashPieces.push({
          x: px + d[0] + (Math.random() - 0.5) * 6,
          y: py + d[1] + (Math.random() - 0.5) * 4,
          vx: d[2], vy: d[3],
          w:  d[4], h:  d[5],
          angle: (Math.random() - 0.5) * 0.4,
          spin:  d[6]
        });
      });
    }

    function updateCrash(dt) {
      crashTimer += dt / 60;
      crashPieces.forEach(function (p) {
        p.x    += p.vx  * dt;
        p.y    += p.vy  * dt;
        p.vy   += 0.28  * dt;   // gravity on debris
        p.angle += p.spin * dt;
      });
      if (crashTimer >= CRASH_DUR) {
        state = 'dead';
        checkHighScore();
      }
    }

    // ─────────────────────────────────────────
    // HIGH SCORE
    // ─────────────────────────────────────────
    function formatTime(s) {
      var m   = Math.floor(s / 60);
      var sec = Math.floor(s % 60);
      var dec = Math.floor((s * 10) % 10);
      return m + ':' + (sec < 10 ? '0' : '') + sec + '.' + dec;
    }

    function checkHighScore() {
      var score = Math.round(elapsed * 10) / 10;
      var best  = globalBest ? globalBest.score : 0;
      if (score > best && score > 1) {
        showNameEntry(score);
      }
    }

    function showNameEntry(score) {
      document.getElementById('nameEntryScore').textContent = formatTime(score);
      document.getElementById('nameInput').value = '';
      document.getElementById('nameEntry').style.display = 'block';
      document.getElementById('nameInput').focus();
    }

    document.getElementById('nameSubmit').addEventListener('click', function () {
      var raw  = document.getElementById('nameInput').value;
      var name = raw.trim().substring(0, 20);
      if (!name) return;
      var score = Math.round(elapsed * 10) / 10;
      submitScore(name, score);
      globalBest = { user: name, score: score };
      updateScoreBar();
      document.getElementById('nameEntry').style.display = 'none';
    });

    document.getElementById('nameInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('nameSubmit').click();
    });

    function fetchGlobalBest() {
      if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return;
      fetch(GAS_URL + '?type=air_get')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.score > 0) {
            globalBest = d;
            updateScoreBar();
          }
        })
        .catch(function () {});
    }

    function submitScore(user, score) {
      if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return;
      var url = GAS_URL
        + '?type=air_submit'
        + '&user='  + encodeURIComponent(user)
        + '&score=' + score;
      fetch(url).catch(function () {});
    }

    function updateScoreBar() {
      var el = document.getElementById('highScoreText');
      if (globalBest && globalBest.score > 0) {
        el.textContent = '  ' + globalBest.user.toUpperCase() + '  —  ' + formatTime(globalBest.score);
      } else {
        el.textContent = '  —';
      }
    }

    // ─────────────────────────────────────────
    // DRAWING — mountains (filled silhouettes, 3 distinct profiles)
    // ─────────────────────────────────────────
    var MTN_W = 800;

    var MTN_FAR = {
      pts: [[0,0],[110,-34],[230,-10],[360,-58],[470,-18],[590,-46],[710,-12],[800,0]],
      color: '#d4d4d4', speedMult: 0.10
    };
    var MTN_MID = {
      pts: [[0,0],[90,-52],[200,-16],[330,-88],[450,-24],[570,-68],[690,-18],[800,0]],
      color: '#a6a6a6', speedMult: 0.26
    };
    var MTN_NEAR = {
      pts: [[0,0],[70,-38],[190,-72],[320,-20],[440,-65],[570,-28],[700,-52],[800,0]],
      color: '#666666', speedMult: 0.50
    };

    function drawMtnSilhouette(mtn, scroll) {
      var pts    = mtn.pts;
      var baseY  = GROUND_Y - 2;
      var offset = ((scroll * mtn.speedMult % MTN_W) + MTN_W) % MTN_W;

      ctx.fillStyle = mtn.color;

      for (var tile = -1; tile <= Math.ceil(W / MTN_W) + 1; tile++) {
        var sx = tile * MTN_W - offset;
        if (sx + MTN_W < 0 || sx > W) continue;

        ctx.beginPath();
        ctx.moveTo(sx, baseY);
        for (var i = 0; i < pts.length; i++) {
          ctx.lineTo(sx + pts[i][0], baseY + pts[i][1]);
        }
        ctx.lineTo(sx + MTN_W, baseY);
        ctx.closePath();
        ctx.fill();
      }
    }

    // ─────────────────────────────────────────
    // DRAWING — ground (rolling hills)
    // ─────────────────────────────────────────
    function hillY(x) {
      // gentle compound sine — scrolls with groundOffset
      var o = x - groundOffset * 0.55;
      return GROUND_Y
        + Math.sin(o * 0.011) * 7
        + Math.sin(o * 0.029) * 3
        + Math.sin(o * 0.057) * 1.5;
    }

    function drawGround() {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.moveTo(0, H);
      ctx.lineTo(0, hillY(0));
      for (var hx = 2; hx <= W; hx += 2) {
        ctx.lineTo(hx, hillY(hx));
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fill();

      // Lakes — white ovals sitting on the ground (Alaskan ponds)
      ctx.fillStyle = '#f0f0f0';
      lakes.forEach(function (l) {
        ctx.beginPath();
        ctx.ellipse(l.x, GROUND_Y + 4, l.w / 2, 7, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      // Runway centre-line dashes while taxiing / just after liftoff
      if (state === 'runway' || (state === 'flying' && elapsed < 1.8)) {
        var dashW = 26, dashH = 3, gap = 52;
        var period = dashW + gap;
        var off = ((groundOffset % period) + period) % period;
        ctx.fillStyle = '#fff';
        for (var rx = -gap; rx < W + gap; rx += period) {
          ctx.fillRect(rx + off, GROUND_Y + Math.floor((H - GROUND_Y) / 2) - 1, dashW, dashH);
        }
      }
    }

    // ─────────────────────────────────────────
    // DRAWING — trees (tiered pine silhouette)
    // ─────────────────────────────────────────
    function drawTree(cx, totalH) {
      ctx.fillStyle = '#000';
      var trunkH = Math.max(10, Math.floor(totalH * 0.1));
      var trunkW = Math.max(4, Math.floor(totalH * 0.042));

      // Trunk
      ctx.fillRect(cx - Math.floor(trunkW / 2), GROUND_Y - trunkH, trunkW, trunkH);

      var foliageH = totalH - trunkH;
      var tiers    = Math.max(3, Math.floor(totalH / 28));
      var baseHalfW = totalH * 0.30;

      for (var i = 0; i < tiers; i++) {
        // Peak of this tier
        var peakY = GROUND_Y - trunkH - ((i + 1) / tiers) * foliageH;
        // Base of this tier (overlaps slightly into tier below)
        var baseY = GROUND_Y - trunkH - (Math.max(0, i - 0.18) / tiers) * foliageH;
        var halfW = baseHalfW * (1 - i * 0.55 / tiers);

        ctx.beginPath();
        ctx.moveTo(cx, peakY);
        ctx.lineTo(cx - halfW, baseY);
        ctx.lineTo(cx + halfW, baseY);
        ctx.closePath();
        ctx.fill();
      }
    }

    // ─────────────────────────────────────────
    // DRAWING — log cabin
    // ─────────────────────────────────────────
    function drawCabin(cx, h) {
      ctx.fillStyle = '#000';
      var bw = Math.round(h * 0.82);
      var bh = Math.round(h * 0.58);
      var rh = h - bh;
      // Body
      ctx.fillRect(cx - bw / 2, GROUND_Y - bh, bw, bh);
      // Roof with slight eave overhang
      ctx.beginPath();
      ctx.moveTo(cx - bw / 2 - 5, GROUND_Y - bh);
      ctx.lineTo(cx,               GROUND_Y - bh - rh);
      ctx.lineTo(cx + bw / 2 + 5, GROUND_Y - bh);
      ctx.closePath();
      ctx.fill();
      // Chimney
      var chW = Math.max(6, Math.round(bw * 0.11));
      var chH = Math.round(rh * 0.62);
      ctx.fillRect(cx + Math.round(bw * 0.15), GROUND_Y - bh - Math.round(rh * 0.48) - chH, chW, chH);
    }

    // ─────────────────────────────────────────
    // DRAWING — totem pole
    // ─────────────────────────────────────────
    function drawTotem(cx, h) {
      ctx.fillStyle = '#000';
      var pw = 13;
      // Main post
      ctx.fillRect(cx - pw / 2, GROUND_Y - h, pw, h);
      // Top face / head
      var hy = GROUND_Y - h + pw / 2;
      ctx.beginPath();
      ctx.arc(cx, hy, pw / 2 + 3, 0, Math.PI * 2);
      ctx.fill();
      // Bilateral beaks (left and right — eagle totem)
      ctx.beginPath();
      ctx.moveTo(cx - pw / 2 - 3, hy - 2);
      ctx.lineTo(cx - pw / 2 - 11, hy);
      ctx.lineTo(cx - pw / 2 - 3,  hy + 2);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + pw / 2 + 3, hy - 2);
      ctx.lineTo(cx + pw / 2 + 11, hy);
      ctx.lineTo(cx + pw / 2 + 3,  hy + 2);
      ctx.closePath(); ctx.fill();
      // Wing sections stacked up the pole
      var sects = h > 95 ? 3 : 2;
      for (var i = 0; i < sects; i++) {
        var wy  = GROUND_Y - h * (0.28 + i * 0.27);
        var ww  = 15 + (sects - i) * 7;  // each wing's half-span beyond post
        var wh  = Math.max(9, Math.round(h * 0.10));
        var span = ww + pw;               // full width: left-wing + post + right-wing
        ctx.fillRect(cx - span / 2, wy - wh / 2, span, wh);
        // Pointed tips — symmetric on both sides
        ctx.beginPath();
        ctx.moveTo(cx - span / 2,     wy - wh / 2);
        ctx.lineTo(cx - span / 2 - 7, wy);
        ctx.lineTo(cx - span / 2,     wy + wh / 2);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx + span / 2,     wy - wh / 2);
        ctx.lineTo(cx + span / 2 + 7, wy);
        ctx.lineTo(cx + span / 2,     wy + wh / 2);
        ctx.closePath(); ctx.fill();
      }
    }

    // ─────────────────────────────────────────
    // DRAWING — igloo
    // ─────────────────────────────────────────
    function drawIgloo(cx, h) {
      ctx.fillStyle = '#000';
      // Main dome — h is the dome radius
      ctx.beginPath();
      ctx.arc(cx, GROUND_Y, h, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      // Square entrance cutout (white rectangle punched into dome face)
      var dw = Math.round(h * 0.30);
      var dh = Math.round(h * 0.36);
      var dx = cx + Math.round(h * 0.46);
      ctx.fillStyle = '#fff';
      ctx.fillRect(dx - dw / 2, GROUND_Y - dh, dw, dh);
    }

    // ─────────────────────────────────────────
    // DRAWING — seal
    // ─────────────────────────────────────────
    function drawSeal(cx, h) {
      ctx.fillStyle = '#000';
      var bW = h * 1.7;
      var bH = h * 0.32;
      // Body
      ctx.beginPath();
      ctx.ellipse(cx, GROUND_Y - bH, bW, bH, 0.08, 0, Math.PI * 2);
      ctx.fill();
      // Head (right end, raised)
      var hr = h * 0.32;
      ctx.beginPath();
      ctx.arc(cx + bW * 0.72, GROUND_Y - bH * 2.2, hr, 0, Math.PI * 2);
      ctx.fill();
      // Snout
      ctx.beginPath();
      ctx.ellipse(cx + bW * 0.72 + hr, GROUND_Y - bH * 2.0, hr * 0.38, hr * 0.28, 0.25, 0, Math.PI * 2);
      ctx.fill();
      // Front flipper
      ctx.beginPath();
      ctx.ellipse(cx + bW * 0.28, GROUND_Y - bH * 0.5, h * 0.22, h * 0.10, 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Tail flippers
      ctx.beginPath();
      ctx.ellipse(cx - bW * 0.85, GROUND_Y - bH * 1.5, h * 0.20, h * 0.09, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx - bW * 0.85, GROUND_Y - bH * 0.5, h * 0.18, h * 0.09,  0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // ─────────────────────────────────────────
    // DRAWING — jumping fish
    // ─────────────────────────────────────────
    function drawFish(f) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(Math.max(-1.1, Math.min(1.1, f.vy * 0.20)));
      ctx.fillStyle = '#000';
      // Body
      ctx.beginPath();
      ctx.ellipse(0, 0, 7, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.beginPath();
      ctx.moveTo(-7, 0);
      ctx.lineTo(-13, -4);
      ctx.lineTo(-13,  4);
      ctx.closePath();
      ctx.fill();
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(4, -1, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ─────────────────────────────────────────
    // DRAWING — crash debris pieces
    // ─────────────────────────────────────────
    function drawCrashPieces() {
      ctx.fillStyle = '#000';
      crashPieces.forEach(function (p) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
    }

    // Route obstacle draw by type
    function drawObstacle(t) {
      if      (t.type === 'cabin') drawCabin(t.x, t.h);
      else if (t.type === 'totem') drawTotem(t.x, t.h);
      else if (t.type === 'igloo') drawIgloo(t.x, t.h);
      else if (t.type === 'seal')  drawSeal(t.x, t.h);
      else                         drawTree(t.x, t.h);
    }

    // ─────────────────────────────────────────
    // DRAWING — clouds (grey + black outline, round bubbles)
    // ─────────────────────────────────────────
    function drawCloud(c) {
      var r     = c.bumpR;
      var left  = c.x - c.w / 2;
      var right = c.x + c.w / 2;
      var bottomY = c.bottom - r;
      var n = Math.max(2, Math.round(c.w / (r * 1.5)));

      ctx.fillStyle = '#e2e2e2';

      // Body fill (inset from sides — circles will round the edges)
      if (c.w > 2 * r) {
        ctx.fillRect(left + r, 0, c.w - 2 * r, bottomY + r);
      }
      // Left edge: overlapping circles form a rounded left side
      for (var y = 0; y <= bottomY; y += r) {
        ctx.beginPath(); ctx.arc(left + r, y, r, 0, Math.PI * 2); ctx.fill();
      }
      // Right edge: overlapping circles form a rounded right side
      for (var y = 0; y <= bottomY; y += r) {
        ctx.beginPath(); ctx.arc(right - r, y, r, 0, Math.PI * 2); ctx.fill();
      }
      // Bottom bumps
      for (var i = 0; i < n; i++) {
        var bx = (n > 1) ? left + r + (i / (n - 1)) * (c.w - 2 * r) : c.x;
        ctx.beginPath(); ctx.arc(bx, bottomY, r, 0, Math.PI * 2); ctx.fill();
      }
      // Outline: bottom-half arc only (avoids overlapping ring effect)
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      for (var i = 0; i < n; i++) {
        var bx = (n > 1) ? left + r + (i / (n - 1)) * (c.w - 2 * r) : c.x;
        ctx.beginPath(); ctx.arc(bx, bottomY, r, 0, Math.PI); ctx.stroke();
      }
      ctx.lineWidth = 1;
    }

    // ─────────────────────────────────────────
    // DRAWING — plane (Piper Cherokee Six profile)
    // ─────────────────────────────────────────
    function drawPlane() {
      ctx.save();
      ctx.translate(PLANE_X, plane.y);
      ctx.rotate(plane.angle);
      if (inverted) ctx.scale(1, -1);  // flip upside-down when cloud-inverted
      ctx.fillStyle = '#000';

      // Fuselage — long, blunt nose, tapers to tail point
      ctx.beginPath();
      ctx.moveTo(-34, 0);                              // tail point
      ctx.lineTo(-30, -3);                             // tail top
      ctx.bezierCurveTo(-14, -5, 8, -6, 24, -5);      // top fuselage
      ctx.bezierCurveTo(34, -4, 40, -2, 42, 0);       // nose top
      ctx.bezierCurveTo(40,  2, 34,  4, 24,  4);      // nose bottom
      ctx.bezierCurveTo( 8,  5, -14, 4, -30,  2);     // bottom fuselage
      ctx.lineTo(-34, 0);
      ctx.closePath();
      ctx.fill();

      // Cabin — Cherokee-style long greenhouse, flat top
      ctx.beginPath();
      ctx.moveTo(-4, -5);
      ctx.lineTo(-2, -13);
      ctx.lineTo(20, -13);
      ctx.lineTo(24,  -5);
      ctx.closePath();
      ctx.fill();

      // Low wing — Cherokee is low-wing, roots at belly
      ctx.beginPath();
      ctx.moveTo( 12,  3);   // root leading edge
      ctx.lineTo(-16, 24);   // tip leading edge
      ctx.lineTo(-11, 26);   // tip trailing edge
      ctx.lineTo( 18,  5);   // root trailing edge
      ctx.closePath();
      ctx.fill();

      // Vertical stabilizer — tall, slightly swept
      ctx.beginPath();
      ctx.moveTo(-30, -3);   // base front (fuselage top)
      ctx.lineTo(-33, -24);  // fin top leading edge
      ctx.lineTo(-24, -22);  // fin top trailing edge
      ctx.lineTo(-22, -3);   // base rear
      ctx.closePath();
      ctx.fill();

      // Horizontal stabilizer
      ctx.beginPath();
      ctx.moveTo(-30,  1);
      ctx.lineTo(-42,  5);
      ctx.lineTo(-40,  7);
      ctx.lineTo(-28,  3);
      ctx.closePath();
      ctx.fill();

      // Propeller blades + spinner hub
      ctx.beginPath();
      ctx.ellipse(42, -10, 3, 10, 0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(42,  10, 3, 10, -0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(42, 0, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // ─────────────────────────────────────────
    // DRAWING — bear silhouette on ground
    // ─────────────────────────────────────────
    function drawBear(x) {
      ctx.fillStyle = '#000';
      var base = GROUND_Y - 2;

      // Legs (drawn first so body overlaps the tops cleanly)
      ctx.fillRect(x - 12, base - 7, 5, 7);
      ctx.fillRect(x - 4,  base - 7, 5, 7);
      ctx.fillRect(x + 6,  base - 7, 5, 7);
      ctx.fillRect(x + 14, base - 7, 5, 7);

      // Body
      ctx.beginPath();
      ctx.ellipse(x, base - 13, 16, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head (facing right)
      ctx.beginPath();
      ctx.arc(x + 18, base - 18, 9, 0, Math.PI * 2);
      ctx.fill();

      // Snout
      ctx.beginPath();
      ctx.ellipse(x + 26, base - 16, 5, 4, 0.2, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      ctx.beginPath();
      ctx.arc(x + 13, base - 26, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 21, base - 27, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // ─────────────────────────────────────────
    // DRAWING — moose silhouette on ground
    // ─────────────────────────────────────────
    function drawMoose(x) {
      ctx.fillStyle = '#000';
      var base = GROUND_Y - 2;

      // Legs (drawn first so body overlaps cleanly)
      ctx.fillRect(x - 14, base - 22, 5, 22);
      ctx.fillRect(x - 4,  base - 22, 5, 22);
      ctx.fillRect(x + 8,  base - 22, 5, 22);
      ctx.fillRect(x + 18, base - 22, 5, 22);

      // Body
      ctx.beginPath();
      ctx.ellipse(x + 4, base - 26, 22, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      // Neck
      ctx.beginPath();
      ctx.moveTo(x + 16, base - 34);
      ctx.lineTo(x + 20, base - 54);
      ctx.lineTo(x + 28, base - 52);
      ctx.lineTo(x + 24, base - 30);
      ctx.closePath();
      ctx.fill();

      // Head
      ctx.beginPath();
      ctx.ellipse(x + 27, base - 59, 10, 7, -0.2, 0, Math.PI * 2);
      ctx.fill();

      // Droopy moose snout
      ctx.beginPath();
      ctx.ellipse(x + 36, base - 57, 7, 5, 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Antlers
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      // Left antler
      ctx.moveTo(x + 21, base - 63);
      ctx.lineTo(x + 15, base - 79);
      ctx.lineTo(x + 9,  base - 72);
      ctx.moveTo(x + 15, base - 79);
      ctx.lineTo(x + 12, base - 86);
      ctx.moveTo(x + 15, base - 79);
      ctx.lineTo(x + 21, base - 83);
      // Right antler
      ctx.moveTo(x + 27, base - 64);
      ctx.lineTo(x + 31, base - 80);
      ctx.lineTo(x + 37, base - 73);
      ctx.moveTo(x + 31, base - 80);
      ctx.lineTo(x + 33, base - 87);
      ctx.moveTo(x + 31, base - 80);
      ctx.lineTo(x + 25, base - 84);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.lineCap = 'butt';
    }

    // ─────────────────────────────────────────
    // DRAWING — timer + high score proximity (top-right)
    // ─────────────────────────────────────────
    function drawTimer() {
      // White backing so text is legible over any scenery
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillRect(W - 122, 3, 120, 53);

      ctx.textAlign = 'right';

      // Current time
      ctx.font = 'bold 18px Georgia, serif';
      ctx.fillStyle = '#000';
      ctx.fillText(formatTime(elapsed), W - 8, 27);

      // High score comparison line
      if (globalBest && globalBest.score > 0) {
        var gap = globalBest.score - elapsed;
        ctx.font = '11px Georgia, serif';
        if (gap > 0) {
          ctx.fillStyle = '#000';
          ctx.fillText(formatTime(gap) + ' to record', W - 8, 46);
        } else {
          if (Math.floor(Date.now() / 480) % 2 === 0) {
            ctx.fillStyle = '#000';
            ctx.fillText('NEW RECORD', W - 8, 46);
          }
        }
      }

      ctx.textAlign = 'left';
    }

    // ─────────────────────────────────────────
    // DRAWING — hypoxia alert (3-2-1 countdown)
    // ─────────────────────────────────────────
    function drawHypoxia() {
      // Descent is immediate — show pulsing countdown as visual feedback while diving
      ctx.textAlign = 'center';
      var remain = Math.max(0, HYPOXIA_DUR - hypoxiaTimer);
      var count  = Math.max(1, Math.ceil(remain));
      var frac   = remain > 0 ? remain % 1 : 0;
      var sz     = Math.round(22 + frac * 20);
      ctx.font   = 'bold ' + sz + 'px Georgia, serif';
      ctx.fillStyle = '#000';
      ctx.fillText(count, W / 2, HYPOXIA_Y + sz + 2);
      ctx.font = 'bold 11px Georgia, serif';
      ctx.fillText('HYPOXIA — AUTO DESCENDING', W / 2, HYPOXIA_Y + sz + 18);
      ctx.textAlign = 'left';
    }

    // ─────────────────────────────────────────
    // DRAWING — intro screen
    // ─────────────────────────────────────────
    function drawIntro() {
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';

      ctx.font = 'bold 30px Georgia, serif';
      ctx.fillText('WALTHER AIR', W / 2, H / 2 - 68);

      ctx.font = '13px Georgia, serif';
      var lines = [
        'Keep the plane aloft. Avoid trees and clouds.',
        'Flying too high triggers a hypoxia alert — descend fast.',
        '',
        'Repeatedly press to climb.  Release to descend.',
        '',
        'SPACEBAR  or  TAP  to begin.'
      ];
      lines.forEach(function (line, i) {
        ctx.fillText(line, W / 2, H / 2 - 22 + i * 22);
      });
      ctx.textAlign = 'left';
    }

    // ─────────────────────────────────────────
    // DRAWING — game over overlay
    // ─────────────────────────────────────────
    function drawGameOver() {
      var bw = 282, bh = 112;
      var bx = W / 2 - bw / 2, by = H / 2 - bh / 2;

      ctx.fillStyle = '#fff';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, bw, bh);

      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';

      ctx.font = 'bold 21px Georgia, serif';
      ctx.fillText('GAME OVER', W / 2, by + 34);

      ctx.font = '15px Georgia, serif';
      ctx.fillText('Time aloft:  ' + formatTime(elapsed), W / 2, by + 63);

      ctx.font = '12px Georgia, serif';
      ctx.fillText('SPACE or FLY to try again', W / 2, by + 90);

      ctx.textAlign = 'left';
    }

    // ─────────────────────────────────────────
    // MAIN DRAW
    // ─────────────────────────────────────────
    function draw() {
      // Background
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);

      // Mountain silhouettes — far to near, each with distinct profile
      var scroll = -bgOffset;
      drawMtnSilhouette(MTN_FAR,  scroll);
      drawMtnSilhouette(MTN_MID,  scroll);
      drawMtnSilhouette(MTN_NEAR, scroll);

      // Ground
      drawGround();

      // Ground obstacles + decorative trees
      trees.forEach(function      (t) { drawObstacle(t); });
      smallTrees.forEach(function (t) { drawTree(t.x, t.h); });

      // Ground animals
      animals.forEach(function (a) {
        if (a.type === 'bear') drawBear(a.x);
        else                   drawMoose(a.x);
      });

      // Clouds
      clouds.forEach(function (c) { drawCloud(c); });

      // Fish (jump from lakes, drawn above ground + clouds but below plane)
      fish.forEach(function (f) { drawFish(f); });

      // Plane (replaced by debris during crash)
      if (state !== 'crashing') drawPlane();
      if (state === 'crashing') drawCrashPieces();

      // Timer
      if (state === 'flying' || state === 'crashing' || state === 'dead') drawTimer();

      // Hypoxia warning
      if (hypoxiaActive && state === 'flying') drawHypoxia();

      // State overlays
      if (state === 'intro') drawIntro();
      if (state === 'dead')  drawGameOver();
    }

    // ─────────────────────────────────────────
    // GAME LOOP
    // ─────────────────────────────────────────
    function loop(ts) {
      update(ts);
      draw();
      requestAnimationFrame(loop);
    }

    // ─────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────
    resetAll();
    fetchGlobalBest();
    requestAnimationFrame(loop);

  }());
  </script>

  <script src="menu.js"></script>
</body>
